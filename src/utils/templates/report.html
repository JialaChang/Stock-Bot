<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <title>$title</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 24px; color: #222; }
    h1 { font-size: 18px; }
    h2 { font-size: 15px; margin: 28px 0 8px; }
    .meta { color: #777; font-size: 13px; margin-bottom: 16px; }
    table { border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { padding: 4px 12px; text-align: right; border-bottom: 1px solid #eee; }
    th:first-child, td:first-child { text-align: left; }
    thead th { position: sticky; top: 0; background: #fafafa; border-bottom: 2px solid #ccc; }
    tr:hover td { background: #f5f8ff; }
    .up { color: #d33; }    /* TW convention: red = up */
    .down { color: #2a8; }  /* green = down */
    .flat { color: #888; }
  </style>
</head>

<body>
  
  <h1>$title</h1>

  $meta

  $body

</body>

</html>
